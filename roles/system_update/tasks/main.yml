---
# System update tasks

- name: Include OS-specific tasks
  ansible.builtin.include_tasks: "{{ item }}"
  with_first_found:
    - files:
        - "update_{{ ansible_os_family | lower }}.yml"
        - "update_default.yml"
      skip: true

- name: Check if reboot is required (Debian-based)
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: reboot_required_file
  when: ansible_os_family == "Debian"

- name: Set reboot required fact
  ansible.builtin.set_fact:
    system_reboot_required: "{{ reboot_required_file.stat.exists | default(false) }}"
  when: ansible_os_family == "Debian"

- name: Display reboot notification
  ansible.builtin.debug:
    msg: "REBOOT REQUIRED - System updates require a restart"
  when:
    - ansible_os_family == "Debian"
    - system_reboot_required | default(false)
