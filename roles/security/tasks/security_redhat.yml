---
# RedHat/CentOS-specific security tasks

- name: Install firewalld
  ansible.builtin.package:
    name: firewalld
    state: present
  become: true

- name: Start and enable firewalld
  ansible.builtin.systemd:
    name: firewalld
    state: started
    enabled: true
  become: true
  when: enable_firewall | default(true)

- name: Configure SSH hardening
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
    validate: '/usr/sbin/sshd -t -f %s'
  loop:
    - { regexp: '^#?PermitRootLogin', line: 'PermitRootLogin no' }
    - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication no' }
    - { regexp: '^#?PubkeyAuthentication', line: 'PubkeyAuthentication yes' }
    - { regexp: '^#?Protocol', line: 'Protocol 2' }
    - { regexp: '^#?X11Forwarding', line: 'X11Forwarding no' }
    - { regexp: '^#?MaxAuthTries', line: 'MaxAuthTries 3' }
  become: true
  notify: Restart SSH
  when:
    - harden_ssh | default(true)
    - keep_ssh_enabled | default(true)

- name: Enable automatic security updates
  ansible.builtin.package:
    name: dnf-automatic
    state: present
  become: true
  when:
    - ansible_distribution_major_version | int >= 8
    - enable_automatic_security_updates | default(true)

- name: Configure dnf-automatic
  ansible.builtin.lineinfile:
    path: /etc/dnf/automatic.conf
    regexp: '^apply_updates'
    line: 'apply_updates = yes'
  become: true
  when:
    - ansible_distribution_major_version | int >= 8
    - enable_automatic_security_updates | default(true)

- name: Enable and start auditd
  ansible.builtin.systemd:
    name: auditd
    state: started
    enabled: true
  become: true
  failed_when: false
  when: enable_auditd | default(false)
