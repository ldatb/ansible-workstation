---
# Security hardening tasks

- name: Include OS-specific security tasks
  ansible.builtin.include_tasks: "{{ item }}"
  with_first_found:
    - files:
        - "security_{{ ansible_os_family | lower }}.yml"
      skip: true

- name: Common security tasks
  ansible.builtin.include_tasks: security_common.yml

- name: Install security tools
  ansible.builtin.include_tasks: install_security_tools.yml
  when: install_security_tools | default(true)
