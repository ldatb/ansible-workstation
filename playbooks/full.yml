---
# Main playbook - runs all roles
# Usage: ansible-playbook playbooks/full.yml

- name: Complete workstation management
  hosts: workstation
  gather_facts: true

  roles:
    - role: common
      tags: [always]

    - role: system_update
      tags: [update, maintenance]

    - role: backup
      tags: [backup, maintenance]

    - role: security
      tags: [security, hardening]

    - role: compliance
      tags: [compliance, audit]

  post_tasks:
    - name: Display completion message
      ansible.builtin.debug:
        msg:
          - "============================================="
          - "Workstation management completed successfully"
          - "============================================="
          - "Roles executed: common, system_update, backup, security, compliance"
          - "Review logs at: ./ansible.log"
      tags: [always]
